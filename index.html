    <!-- Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Rolling Returns Calculator",
      "url": "https://mf-rolling-returns.vercel.app/",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "INR" },
      "description": "Free rolling returns calculator for Indian mutual funds. Analyse CAGR across every historical entry date and compare funds by consistency.",
      "featureList": [
        "Rolling returns for 14,000+ mutual funds",
        "1M to 10Y rolling windows",
        "Compare up to 6 funds side by side",
        "Best, worst, median, average and consistency metrics",
        "Live NAV data from AMFI"

    }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What are rolling returns?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Rolling returns measure a fund's return for every possible entry date across its history, instead of a single start-to-end period. This reveals how consistent a fund really is, because it shows the best case, worst case and typical outcome no matter when you invested."
          }
        },
        {
          "@type": "Question",
          "name": "Why are point-to-point returns misleading?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Point-to-point returns depend entirely on the start and end dates chosen. A fund can look excellent over one 5-year window and poor over another that starts a year later. Rolling returns remove this cherry-picking by averaging across all entry dates."
          }
        },
        {
          "@type": "Question",
          "name": "Is this rolling returns calculator free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The tool is completely free, requires no sign-up, and covers over 14,000 AMFI-registered Indian mutual funds using live NAV data."
          }
        }
      ]
    }
    </script>
