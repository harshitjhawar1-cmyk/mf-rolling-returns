<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#g)"/>
  <g fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- rising bars: returns growing over time -->
    <path d="M18 46 L18 38"/>
    <path d="M31 46 L31 31"/>
    <path d="M44 46 L44 25"/>
    <!-- rolling curve rising over the bars -->
    <path d="M14 37 Q 28 19 47 18"/>
  </g>
  <!-- endpoint marker on the trend -->
  <circle cx="47" cy="18" r="3.6" fill="#fff"/>
</svg>
